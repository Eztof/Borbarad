<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Borbarad x Supabase</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <!-- Supabase JS v2 via CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./assets/app.js"></script>
</head>
<body>
  <header>
    <h1>Borbarad</h1>
    <p>Supabase Demo (Nachrichtenboard mit Realtime)</p>
  </header>

  <main>
    <section class="composer">
      <form id="message-form">
        <input id="message-input" type="text" placeholder="Nachricht eingeben…" maxlength="500" required />
        <button type="submit">Senden</button>
      </form>
      <p id="status" class="muted"></p>
    </section>

    <section>
      <h2>Nachrichten</h2>
      <ul id="messages"></ul>
    </section>
  </main>

  <footer>
    <small>Powered by Supabase & GitHub Pages</small>
  </footer>
</body>
</html>
