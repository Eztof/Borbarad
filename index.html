<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Borbarad Supabase Demo</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./assets/app.js"></script>
</head>
<body>
  <header>
    <h1>Borbarad</h1>
    <p>Supabase Demo – Nachrichten & Bilder</p>
  </header>

  <main>
    <!-- Nachrichten -->
    <section class="composer">
      <form id="message-form">
        <input id="message-input" type="text" placeholder="Nachricht eingeben…" maxlength="500" required />
        <button type="submit">Senden</button>
      </form>
      <p id="status" class="muted"></p>
    </section>

    <section>
      <h2>Nachrichten</h2>
      <ul id="messages"></ul>
    </section>

    <!-- Bild-Upload -->
    <section class="uploader">
      <h2>Bilder hochladen</h2>
      <form id="upload-form">
        <input id="file-input" type="file" accept="image/*" />
        <button type="submit">Hochladen</button>
      </form>
      <p id="upload-status" class="muted"></p>
    </section>

    <!-- Galerie -->
    <section>
      <h2>Galerie</h2>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <footer>
    <small>Powered by Supabase & GitHub Pages</small>
  </footer>
</body>
</html>
