<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Borbarad – Meistertool (DSA)</title>
  <link rel="stylesheet" href="./styles.css" />
  <!-- Supabase JS via CDN -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <h1>Borbarad</h1>
    <nav id="nav-auth" class="hidden">
      <span id="nav-username"></span>
      <button id="btn-signout">Abmelden</button>
    </nav>
  </header>

  <main>
    <!-- AUTH VIEW -->
    <section id="view-auth">
      <h2>Anmelden / Registrieren</h2>
      <form id="form-signin" class="card">
        <h3>Anmelden</h3>
        <label>E‑Mail <input type="email" id="si-email" required></label>
        <label>Passwort <input type="password" id="si-password" required></label>
        <button type="submit">Anmelden</button>
      </form>

      <form id="form-signup" class="card">
        <h3>Registrieren</h3>
        <label>Nutzername <input type="text" id="su-username" required></label>
        <label>E‑Mail <input type="email" id="su-email" required></label>
        <label>Passwort <input type="password" id="su-password" required minlength="6"></label>
        <button type="submit">Konto erstellen</button>
      </form>
    </section>

    <!-- APP VIEW -->
    <section id="view-app" class="hidden">
      <div class="toolbar">
        <button id="btn-new-hero">Neuen Helden anlegen</button>
      </div>

      <div class="grid">
        <aside class="card">
          <h3>Helden</h3>
          <ul id="hero-list"></ul>
        </aside>

        <section class="card">
          <h3 id="editor-title">Kein Held ausgewählt</h3>
          <form id="hero-form" class="hidden">
            <input type="hidden" id="hero-id" />
            <label>Name <input type="text" id="hero-name" required></label>
            <label>Spezies <input type="text" id="hero-species"></label>
            <label>Profession <input type="text" id="hero-profession"></label>
            <label>Stufe <input type="number" id="hero-level" value="1" min="1"></label>

            <fieldset>
              <legend>Attribute (frei als JSON)</legend>
              <textarea id="hero-attrs" rows="6" placeholder='{"MU":12,"KL":13,"IN":12,"CH":10,"FF":11,"GE":12,"KO":11,"KK":12}'></textarea>
            </fieldset>

            <div>
              <label>Portrait <input type="file" id="hero-portrait" accept="image/*"></label>
              <img id="hero-portrait-preview" alt="Portrait-Vorschau" class="preview hidden" />
            </div>

            <div class="row">
              <button type="submit" id="btn-save-hero">Speichern</button>
              <button type="button" id="btn-delete-hero" class="danger">Löschen</button>
              <button type="button" id="btn-cancel" class="secondary">Abbrechen</button>
            </div>
          </form>
        </section>
      </div>
    </section>
  </main>

  <footer>
    <small>© Borbarad – nur für unsere Spielrunde 😊</small>
  </footer>

  <script type="module" src="../src/main.js"></script>
</body>
</html>
